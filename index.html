<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>fun.siiway.org</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      #list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .card {
        border: 1px solid #ccc;
        padding: 12px;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
      }
      .card:hover {
        background: #f5f5f5;
      }
      .license {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Fun Stuff</h1>
    <p>
      <a href="https://github.com/siiway/fun" target="_blank">View on GitHub</a>
    </p>

    <div id="list">Loading...</div>

    <script>
      async function loadSites() {
        const res = await fetch("/sites.json");
        const data = await res.json();

        const container = document.getElementById("list");
        container.innerHTML = "";

        data.sites.forEach((site) => {
          const card = document.createElement("a");
          card.className = "card";
          card.href = site.url;
          card.target = "_blank";

          card.innerHTML = `
          <strong>${site.name}</strong>
          <div>${site.desc}</div>
          <div class="license">License: ${site.license || "unknown"}</div>
        `;

          container.appendChild(card);
        });
      }

      loadSites();
    </script>
  </body>
</html>
